<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지뢰찾기 (Minesweeper) - 힌트 기능 추가</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --cell-size: 35px;
        }
        .grid-board {
            display: grid;
            gap: 2px;
            background-color: #cbd5e1;
            padding: 2px;
            border-radius: 4px;
            margin: 0 auto;
            width: fit-content;
            max-width: 100%;
            overflow-x: auto;
        }
        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            user-select: none;
            transition: all 0.1s;
        }
        .cell-hidden {
            background-color: #f1f5f9;
            box-shadow: inset -2px -2px 0px #94a3b8, inset 2px 2px 0px #ffffff;
        }
        .cell-hidden:hover {
            background-color: #e2e8f0;
        }
        .cell-revealed {
            background-color: #e2e8f0;
            box-shadow: inset 1px 1px 0px #94a3b8;
        }
        .cell-mine {
            background-color: #ef4444 !important;
        }
        
        /* Hint Animation */
        @keyframes pulse-hint {
            0% { background-color: #f1f5f9; }
            50% { background-color: #fef08a; transform: scale(0.95); }
            100% { background-color: #f1f5f9; }
        }
        .hint-cell {
            animation: pulse-hint 1.5s infinite ease-in-out;
            z-index: 10;
        }

        .num-1 { color: #2563eb; }
        .num-2 { color: #16a34a; }
        .num-3 { color: #dc2626; }
        .num-4 { color: #7c3aed; }
        .num-5 { color: #991b1b; }
        .num-6 { color: #0891b2; }
        .num-7 { color: #000000; }
        .num-8 { color: #4b5563; }

        .grid-board::-webkit-scrollbar { height: 8px; }
        .grid-board::-webkit-scrollbar-track { background: #f1f5f9; }
        .grid-board::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center py-8 px-4">

    <div class="max-w-md w-full text-center space-y-6">
        <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">💣 지뢰찾기</h1>
        
        <div class="bg-white p-4 rounded-xl shadow-md space-y-4">
            <div class="flex justify-center gap-2">
                <button onclick="changeDifficulty('easy')" class="px-3 py-1 bg-blue-100 text-blue-700 rounded-md text-sm font-semibold hover:bg-blue-200 transition">초급</button>
                <button onclick="changeDifficulty('medium')" class="px-3 py-1 bg-green-100 text-green-700 rounded-md text-sm font-semibold hover:bg-green-200 transition">중급</button>
                <button onclick="changeDifficulty('hard')" class="px-3 py-1 bg-red-100 text-red-700 rounded-md text-sm font-semibold hover:bg-red-200 transition">고급</button>
            </div>
            
            <div class="flex justify-between items-center px-2 font-mono text-xl">
                <div class="flex items-center gap-2 bg-slate-100 px-3 py-1 rounded">
                    <span>🚩</span>
                    <span id="mine-count">010</span>
                </div>
                <button onclick="initGame()" class="text-2xl hover:scale-110 transition active:scale-95" id="status-btn">😊</button>
                <div class="flex items-center gap-2 bg-slate-100 px-3 py-1 rounded">
                    <span>⏱️</span>
                    <span id="timer">000</span>
                </div>
            </div>

            <div class="flex justify-center gap-4">
                <button id="flag-toggle" onclick="toggleFlagMode()" class="flex items-center gap-2 px-4 py-2 bg-slate-200 text-slate-700 rounded-lg font-bold transition">
                    <span id="flag-icon">🖱️</span> <span id="flag-text">클릭 모드</span>
                </button>
            </div>
        </div>

        <div id="game-board" class="grid-board shadow-xl"></div>
        
        <div class="space-y-2">
            <p class="text-slate-500 text-xs font-medium bg-slate-200/50 py-1 px-3 rounded-full inline-block">
                💡 10초 동안 움직임이 없으면 안전한 칸을 알려줍니다!
            </p>
            <p class="text-slate-400 text-sm">
                마우스 오른쪽 클릭으로 깃발을 꽂을 수 있습니다.<br>
                모바일에서는 하단 모드 전환 버튼을 사용하세요.
            </p>
        </div>
    </div>

    <div id="message-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-xs w-full text-center space-y-4">
            <h2 id="modal-title" class="text-2xl font-bold"></h2>
            <p id="modal-body" class="text-slate-600"></p>
            <button onclick="closeModal()" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition">다시 시도</button>
        </div>
    </div>

    <script>
        const CONFIGS = {
            easy: { rows: 9, cols: 9, mines: 10 },
            medium: { rows: 13, cols: 13, mines: 40 },
            hard: { rows: 16, cols: 16, mines: 60 }
        };

        let currentDifficulty = 'easy';
        let board = [];
        let minesLocations = [];
        let revealedCount = 0;
        let flagsCount = 0;
        let timer = 0;
        let timerInterval = null;
        let hintInterval = null;
        let lastActionTime = 0;
        let isGameOver = false;
        let isFirstClick = true;
        let isFlagMode = false;
        let activeHintCell = null;

        const boardElement = document.getElementById('game-board');
        const mineCountDisplay = document.getElementById('mine-count');
        const timerDisplay = document.getElementById('timer');
        const statusBtn = document.getElementById('status-btn');
        const flagToggleBtn = document.getElementById('flag-toggle');

        function changeDifficulty(diff) {
            currentDifficulty = diff;
            initGame();
        }

        function toggleFlagMode() {
            isFlagMode = !isFlagMode;
            flagToggleBtn.classList.toggle('bg-orange-100', isFlagMode);
            flagToggleBtn.classList.toggle('text-orange-600', isFlagMode);
            document.getElementById('flag-icon').innerText = isFlagMode ? '🚩' : '🖱️';
            document.getElementById('flag-text').innerText = isFlagMode ? '깃발 모드' : '클릭 모드';
        }

        function initGame() {
            const { rows, cols, mines } = CONFIGS[currentDifficulty];
            
            board = [];
            minesLocations = [];
            revealedCount = 0;
            flagsCount = 0;
            timer = 0;
            isGameOver = false;
            isFirstClick = true;
            lastActionTime = Date.now();
            clearHint();
            
            clearInterval(timerInterval);
            clearInterval(hintInterval);
            timerInterval = null;
            hintInterval = null;
            
            mineCountDisplay.innerText = String(mines).padStart(3, '0');
            timerDisplay.innerText = '000';
            statusBtn.innerText = '😊';
            boardElement.innerHTML = '';
            boardElement.style.gridTemplateColumns = `repeat(${cols}, var(--cell-size))`;

            for (let r = 0; r < rows; r++) {
                board[r] = [];
                for (let c = 0; c < cols; c++) {
                    const cellObj = {
                        r, c,
                        isMine: false,
                        isRevealed: false,
                        isFlagged: false,
                        neighborMines: 0
                    };
                    
                    const div = document.createElement('div');
                    div.className = 'cell cell-hidden';
                    div.id = `cell-${r}-${c}`;
                    
                    div.addEventListener('click', () => handleCellClick(r, c));
                    div.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        handleRightClick(r, c);
                    });

                    boardElement.appendChild(div);
                    cellObj.el = div;
                    board[r][c] = cellObj;
                }
            }
        }

        function startTimers() {
            if (timerInterval) return;
            
            // Game Timer
            timerInterval = setInterval(() => {
                timer++;
                if (timer > 999) timer = 999;
                timerDisplay.innerText = String(timer).padStart(3, '0');
            }, 1000);

            // Hint Timer (Check every 1 second if 10s passed since last action)
            hintInterval = setInterval(() => {
                if (isGameOver || isFirstClick) return;
                
                const now = Date.now();
                if (now - lastActionTime >= 10000 && !activeHintCell) {
                    provideHint();
                }
            }, 1000);
        }

        function resetActionTimer() {
            lastActionTime = Date.now();
            clearHint();
        }

        function clearHint() {
            if (activeHintCell) {
                activeHintCell.el.classList.remove('hint-cell');
                activeHintCell = null;
            }
        }

        function provideHint() {
            const safeHiddenCells = [];
            const { rows, cols } = CONFIGS[currentDifficulty];

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = board[r][c];
                    if (!cell.isMine && !cell.isRevealed && !cell.isFlagged) {
                        safeHiddenCells.push(cell);
                    }
                }
            }

            if (safeHiddenCells.length > 0) {
                const randomCell = safeHiddenCells[Math.floor(Math.random() * safeHiddenCells.length)];
                activeHintCell = randomCell;
                randomCell.el.classList.add('hint-cell');
            }
        }

        function placeMines(firstR, firstC) {
            const { rows, cols, mines } = CONFIGS[currentDifficulty];
            let placed = 0;
            while (placed < mines) {
                let r = Math.floor(Math.random() * rows);
                let c = Math.floor(Math.random() * cols);
                
                if ((r === firstR && c === firstC) || board[r][c].isMine) continue;
                
                board[r][c].isMine = true;
                minesLocations.push([r, c]);
                placed++;
            }

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (board[r][c].isMine) continue;
                    let count = 0;
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            const nr = r + dr, nc = c + dc;
                            if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && board[nr][nc].isMine) {
                                count++;
                            }
                        }
                    }
                    board[r][c].neighborMines = count;
                }
            }
        }

        function handleCellClick(r, c) {
            if (isGameOver || board[r][c].isRevealed) return;

            resetActionTimer();

            if (isFlagMode) {
                handleRightClick(r, c);
                return;
            }

            if (board[r][c].isFlagged) return;

            if (isFirstClick) {
                isFirstClick = false;
                placeMines(r, c);
                startTimers();
            }

            if (board[r][c].isMine) {
                gameOver(false);
                return;
            }

            revealCell(r, c);
            checkWin();
        }

        function handleRightClick(r, c) {
            if (isGameOver || board[r][c].isRevealed) return;

            resetActionTimer();

            const cell = board[r][c];
            cell.isFlagged = !cell.isFlagged;
            cell.el.innerText = cell.isFlagged ? '🚩' : '';
            
            const { mines } = CONFIGS[currentDifficulty];
            flagsCount += cell.isFlagged ? 1 : -1;
            mineCountDisplay.innerText = String(Math.max(0, mines - flagsCount)).padStart(3, '0');
        }

        function revealCell(r, c) {
            const { rows, cols } = CONFIGS[currentDifficulty];
            const cell = board[r][c];
            if (cell.isRevealed || cell.isFlagged) return;

            cell.isRevealed = true;
            revealedCount++;
            cell.el.className = 'cell cell-revealed';
            
            if (cell.neighborMines > 0) {
                cell.el.innerText = cell.neighborMines;
                cell.el.classList.add(`num-${cell.neighborMines}`);
            } else {
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        const nr = r + dr, nc = c + dc;
                        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
                            revealCell(nr, nc);
                        }
                    }
                }
            }
        }

        function checkWin() {
            const { rows, cols, mines } = CONFIGS[currentDifficulty];
            if (revealedCount === (rows * cols) - mines) {
                gameOver(true);
            }
        }

        function gameOver(isWin) {
            isGameOver = true;
            clearInterval(timerInterval);
            clearInterval(hintInterval);
            statusBtn.innerText = isWin ? '😎' : '😵';

            minesLocations.forEach(([r, c]) => {
                const cell = board[r][c];
                if (!isWin && cell.isMine) {
                    cell.el.innerText = '💣';
                    cell.el.classList.add('cell-mine');
                } else if (isWin && cell.isMine) {
                    cell.el.innerText = '🚩';
                }
            });

            setTimeout(() => {
                showModal(
                    isWin ? "승리했습니다!" : "게임 종료",
                    isWin ? `${timer}초 만에 모든 지뢰를 찾았습니다!` : "지뢰를 밟았습니다. 다시 도전해보세요!"
                );
            }, 500);
        }

        function showModal(title, body) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerText = body;
            document.getElementById('message-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('message-modal').classList.add('hidden');
            initGame();
        }

        window.onload = initGame;
    </script>
</body>
</html>
